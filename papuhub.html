<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPU-HUB 🦾 Portal de Los Papus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060e1a;
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.4);
            --text: #c0e8ff;
            --card: rgba(10, 20, 40, 0.6);
            --border: rgba(0, 212, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            background: radial-gradient(circle at top right, #0a1b2e, #060e1a);
        }

        /* MATRIX CANVAS BEHIND */
        #hub-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.1; pointer-events: none; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            letter-spacing: 5px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
            margin-bottom: 10px;
        }

        header p {
            color: rgba(192, 232, 255, 0.5);
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* APP GRID */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
            width: 100%;
            animation: fadeInUp 1s ease-out;
        }

        .app-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .app-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.05));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .app-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        }

        .app-card:hover::before { opacity: 1; }

        .app-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
            transition: transform 0.4s;
        }

        .app-card:hover .app-icon { transform: scale(1.2); }

        .app-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
            letter-spacing: 1px;
        }

        .app-desc {
            font-size: 13px;
            color: rgba(192, 232, 255, 0.4);
            line-height: 1.6;
        }

        /* STATUS DOT */
        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: bold;
            color: #555;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: #444; }
        .active .dot { background: #00ff9d; box-shadow: 0 0 8px #00ff9d; }
        .active .status-text { color: #00ff9d; }

        /* FOOTER HUD */
        .footer-hud {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 24px;
            font-size: 11px;
            color: rgba(192, 232, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* KEYFRAMES */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            header h1 { font-size: 32px; }
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="hub-canvas"></canvas>
    <div class="container">
        <header>
            <h1>PAPU-HUB</h1>
            <p>SISTEMA CENTRAL DE CONTROL // CLAN LOS PAPUS</p>
        </header>

        <div class="app-grid" id="app-list">
            <!-- Cargando Aplicaciones... -->
        </div>

        <div class="footer-hud">
            <span>REGISTRY: papu_apps.json</span>
            <span>SYSTEM: PARROT OS v7.1</span>
            <span>STATUS: READY</span>
        </div>
    </div>

    <script>
        async function loadApps() {
            try {
                const res = await fetch('papu_apps.json');
                const apps = await res.json();
                const list = document.getElementById('app-list');
                list.innerHTML = '';

                apps.forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    card.onclick = () => window.open(app.url, '_blank');
                    
                    const statusClass = app.type === 'file' ? 'active' : '';

                    card.innerHTML = `
                        <div class="status-badge ${statusClass}">
                            <div class="dot"></div>
                            <span class="status-text">${app.type === 'file' ? 'LOCAL' : 'OFFLINE'}</span>
                        </div>
                        <span class="app-icon">${app.icon}</span>
                        <div class="app-name">${app.name}</div>
                        <div class="app-desc">${app.description}</div>
                    `;
                    list.appendChild(card);

                    // If it's a server, try to ping it
                    if (app.type === 'server') {
                        checkStatus(app.url, card);
                    }
                });
                
                // Fetch Backups/Logs if PapuControl is Online
                fetchBackups();
            } catch (e) {
                console.error("Error cargando el Hub Registry", e);
            }
        }

        async function fetchBackups() {
            try {
                const res = await fetch('http://localhost:3001/api/logs');
                const logs = await res.json();
                logs.forEach(log => {
                    const appId = log.task.includes('papubank') ? 'papubank' : 
                                  log.task.includes('lospapusxdd') ? 'lospapusxdd' : null;
                    if(appId) {
                        const card = Array.from(document.querySelectorAll('.app-card')).find(c => c.innerHTML.includes(appId));
                        if(card && !card.innerHTML.includes('RECUPERADO')) {
                            const date = new Date(log.created_at).toLocaleString();
                            const desc = card.querySelector('.app-desc');
                            desc.innerHTML += `<div style="margin-top:10px;color:var(--primary);font-size:10px;border-top:1px solid rgba(0,212,255,0.1);padding-top:10px;">🛡️ ÚLTIMO RESPALDO: ${date}</div>`;
                        }
                    }
                });
            } catch (e) {}
        }

        async function checkStatus(url, card) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const res = await fetch(url, { mode: 'no-cors', signal: controller.signal });
                const badge = card.querySelector('.status-badge');
                badge.classList.add('active');
                badge.querySelector('.status-text').innerText = 'ONLINE';
            } catch (e) {}
        }

        // MATRIX EFFECTlite
        function initMatrix() {
            const canvas = document.getElementById('hub-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const letters = "PAPUS0101";
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(6, 14, 26, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00d4ff";
                ctx.font = fontSize + "px Courier New";
                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        }

        window.onload = () => {
            loadApps();
            initMatrix();
        };
    </script>
</body>
</html>
